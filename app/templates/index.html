<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Music Genre Classifier</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      color: #a78bfa;
      margin-bottom: 6px;
      text-align: center;
    }

    p.subtitle {
      color: #888;
      margin-bottom: 30px;
      text-align: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d50;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 700px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #a0a0c0;
      margin-bottom: 8px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #0f0f1a;
      color: #e0e0e0;
      border: 1px solid #3d3d6e;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      outline: none;
      transition: border 0.2s;
    }

    textarea:focus { border-color: #7c3aed; }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }

    button:hover  { opacity: 0.88; }
    button:active { opacity: 0.75; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Result card */
    #result-card { display: none; }

    .top-result {
      text-align: center;
      margin-bottom: 24px;
    }

    .top-result .genre-badge {
      display: inline-block;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      font-size: 1.6rem;
      font-weight: 700;
      padding: 10px 32px;
      border-radius: 50px;
      margin-top: 8px;
      text-transform: capitalize;
    }

    .top-result .conf-label {
      color: #888;
      font-size: 0.85rem;
      margin-top: 6px;
    }

    .chart-wrapper {
      position: relative;
      height: 340px;
    }

    #error-msg {
      color: #f87171;
      margin-top: 12px;
      display: none;
      text-align: center;
    }

    .spinner {
      display: none;
      margin: 12px auto 0;
      width: 28px; height: 28px;
      border: 3px solid #3d3d6e;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>🎵 Music Genre Classifier</h1>
  <p class="subtitle">Paste song lyrics below and discover its genre</p>

  <!-- Input card -->
  <div class="card">
    <label for="lyrics-input">Song Lyrics</label>
    <textarea id="lyrics-input" placeholder="Paste your lyrics here …"></textarea>
    <button id="classify-btn" onclick="classify()">🔍 Classify Genre</button>
    <div class="spinner" id="spinner"></div>
    <p id="error-msg"></p>
  </div>

  <!-- Result card -->
  <div class="card" id="result-card">
    <div class="top-result">
      <label>Predicted Genre</label>
      <div class="genre-badge" id="top-genre">—</div>
      <div class="conf-label" id="top-conf"></div>
    </div>
    <label>Confidence per Genre (%)</label>
    <div class="chart-wrapper">
      <canvas id="genre-chart"></canvas>
    </div>
  </div>

<script>
  let chartInstance = null;

  // Genre colours (one per possible genre)
  const COLORS = [
    "#7c3aed","#4f46e5","#0ea5e9","#10b981",
    "#f59e0b","#ef4444","#ec4899","#14b8a6"
  ];

  async function classify() {
    const lyrics = document.getElementById("lyrics-input").value.trim();
    const btn    = document.getElementById("classify-btn");
    const spinner = document.getElementById("spinner");
    const errMsg  = document.getElementById("error-msg");

    errMsg.style.display = "none";

    if (!lyrics) {
      errMsg.textContent = "⚠️  Please paste some lyrics first.";
      errMsg.style.display = "block";
      return;
    }

    btn.disabled = true;
    spinner.style.display = "block";

    try {
      const res  = await fetch("/predict", {
        method : "POST",
        headers: { "Content-Type": "application/json" },
        body   : JSON.stringify({ lyrics })
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      renderResult(data);
    } catch (err) {
      errMsg.textContent = "❌  " + err.message;
      errMsg.style.display = "block";
    } finally {
      btn.disabled = false;
      spinner.style.display = "none";
    }
  }

  function renderResult(data) {
    const { top_genre, probabilities } = data;

    // Show top genre badge
    document.getElementById("top-genre").textContent = top_genre;
    document.getElementById("top-conf").textContent  =
      `Confidence: ${probabilities[top_genre].toFixed(1)}%`;

    // Sort genres by probability descending
    const entries = Object.entries(probabilities)
                          .sort((a, b) => b[1] - a[1]);
    const labels  = entries.map(e => e[0]);
    const values  = entries.map(e => e[1]);
    const bgColors = labels.map((_, i) => COLORS[i % COLORS.length]);

    // Destroy old chart if exists
    if (chartInstance) chartInstance.destroy();

    const ctx = document.getElementById("genre-chart").getContext("2d");
    chartInstance = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [{
          label: "Confidence (%)",
          data : values,
          backgroundColor: bgColors,
          borderRadius: 8,
          borderSkipped: false,
        }]
      },
      options: {
        indexAxis: "y",          // horizontal bar chart
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.x.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: {
            min: 0, max: 100,
            ticks: { color: "#a0a0c0", callback: v => v + "%" },
            grid : { color: "#2d2d50" }
          },
          y: {
            ticks: { color: "#e0e0e0", font: { size: 13 } },
            grid : { display: false }
          }
        }
      }
    });

    document.getElementById("result-card").style.display = "block";
    document.getElementById("result-card").scrollIntoView({ behavior: "smooth" });
  }
</script>
</body>
</html>
